[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[build]
  command = "DISABLE_ESLINT_PLUGIN=true react-scripts build"
  publish = "build"

[build.environment]
  NODE_VERSION = "18"
  GENERATE_SOURCEMAP = "false"

[[headers]]
  for = "/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
